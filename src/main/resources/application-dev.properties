# ============================================================
# DEV profile
# ============================================================

# DB — matches docker-compose.yml service
spring.datasource.url=jdbc:postgresql://localhost:5432/nplusone_db
spring.datasource.username=nplusone
spring.datasource.password=nplusone
spring.datasource.driver-class-name=org.postgresql.Driver

# DDL — recreate schema on startup from data/schema.sql
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:data/schema.sql
spring.sql.init.data-locations=classpath:data/data.sql

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.nplusone=DEBUG

# Actuator — expose everything in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# DevTools live reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
