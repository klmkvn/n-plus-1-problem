# ============================================================
# Active profile  (override with -Dspring.profiles.active=prod)
# ============================================================
spring.profiles.active=dev

# ============================================================
# Application
# ============================================================
spring.application.name=nplusone

# ============================================================
# Security — set to false to disable the security filter chain
# ============================================================
app.security.enabled=true

# ============================================================
# JPA / Hibernate — shared across profiles
# ============================================================
spring.jpa.open-in-view=false

# Show SQL in logs (disable in prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SOLUTION 3: global batch fetch size — Hibernate batches lazy collection
# loads into IN(...) clauses instead of 1 query per entity.
# Comment this out to see the raw N+1 behaviour on /api/authors/batch-size.
spring.jpa.properties.hibernate.default_batch_fetch_size=25

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true

info.app.name=${spring.application.name}
info.app.description=N+1 Hibernate problem demo
